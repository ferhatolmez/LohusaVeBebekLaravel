# Render deployment - PostgreSQL ile (MySQL Render free tier'da yok)
# Dokümantasyon: DEPLOYMENT.md

services:
  - type: web
    name: lohusa-bebek-izlem
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: file
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: lohusa-db
          property: connectionString
      # APP_KEY ve APP_URL Render Dashboard'dan manuel eklenmeli (Environment)

databases:
  - name: lohusa-db
    plan: free
    databaseName: lohusa

