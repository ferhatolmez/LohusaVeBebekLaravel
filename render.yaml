# Render deployment - PostgreSQL ile (MySQL Render free tier'da yok)
# Dokümantasyon: DEPLOYMENT.md

services:
  - type: web
    name: lohusa-bebek-izlem
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_URL
        fromDatabase:
          name: lohusa-db
          property: connectionString

databases:
  - name: lohusa-db
    plan: free
    databaseName: lohusa
