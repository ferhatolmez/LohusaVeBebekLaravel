version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: lohusa_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: lohusa_nginx
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: lohusa_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: lohusa
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
    ports:
      - '33060:3306'
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
